<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - MPC</title>
    <link rel="shortcut icon" href="https://www.mpclub.dev/_next/image?url=%2Fimages%2Flogo.png&w=32&q=75"
        type="image/x-icon">
</head>

<body>
    <div>
        <img src="https://www.mpclub.dev/_next/image?url=%2Fimages%2Flogo.png&w=32&q=75" alt="Logo">
        <h1>Quản lý MPC</h1>
        <h3>Đăng ký để tiếp tục</h3>
        <form action="#" method="post">
            <div>
                <div>
                    <img src="https://www.mpclub.dev/_next/image?url=%2Fimages%2Flogo.png&w=32&q=75" alt="Avatar">
                </div>
                <label for="avatar">Ảnh đại diện:</label>
                <input type="file" name="avatar" id="avatar" required accept=".jpg, .jpeg, .png">
            </div>
            <div>
                <label for="first_name">Họ:</label>
                <input type="text" name="first_name" id="first_name" placeholder="Nhập họ" required maxlength="100"
                    minlength="2" value="Nguyen">
            </div>
            <div>
                <label for="last_name">Tên:</label>
                <input type="text" name="last_name" id="last_name" placeholder="Nhập tên" required maxlength="100"
                    minlength="2" value="Trieu">
            </div>
            <div>
                <label for="email">Email:</label>
                <input type="email" name="email" id="email" placeholder="Nhập email" required value="mpc@example.com"
                    maxlength="100" minlength="5">
            </div>
            <div>
                <label for="phone">Số điện thoại:</label>
                <input type="tel" name="phone" id="phone" placeholder="Nhập số điện thoại" required maxlength="20"
                    minlength="10" value="0123456789">
            </div>
            <div>
                <label for="password">Mật khẩu:</label>
                <input type="password" name="password" id="password" placeholder="Nhập mật khẩu" required value="123456"
                    maxlength="20" minlength="5">
            </div>
            <div>
                <label for="confirm_password">Xác nhận mật khẩu:</label>
                <input type="password" name="confirm_password" id="confirm_password" placeholder="Xác nhận mật khẩu"
                    required value="123456" maxlength="20" minlength="5">
            </div>
            <div>

                <input type="checkbox" name="accept_terms" id="accept_terms" required>
                <label for="accept_terms">Tôi đồng ý với các <a href="#" target="_blank">điều khoản và điều
                        kiện</a></label>
            </div>
            <button type="submit">Đăng ký</button>
        </form>

        

        
        <div>
            Đã có tài khoản?
            <a href="./login.html">Đăng nhập</a>
        </div>
    </div>
</body>

</html>
