<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - MPC</title>
    <link rel="shortcut icon" href="https://www.mpclub.dev/_next/image?url=%2Fimages%2Flogo.png&w=32&q=75" type="image/x-icon">
</head>

<body>
    <div>
        <img src="https://www.mpclub.dev/_next/image?url=%2Fimages%2Flogo.png&w=32&q=75" alt="Logo">
        <h1>Quản lý MPC</h1>
        <h3>Đăng nhập để tiếp tục</h3>
        <form action="#" method="post">
            <div>
                <label for="email">Email:</label>
                <input type="email" name="email" id="email" placeholder="Nhập email" required
                    value="mpc@example.com" maxlength="100" minlength="5">
            </div>
            <div>
                <label for="password">Mật khẩu:</label>
                <input type="password" name="password" id="password" placeholder="Nhập mật khẩu" required value="123456"
                    maxlength="20" minlength="5">
            </div>
            <div>
                <input type="checkbox" name="remember" id="remember">
                <label for="remember">Ghi nhớ đăng nhập</label>
            </div>
            <button type="submit">Đăng nhập</button>
        </form>

        <div>
            Chưa có tài khoản?
            <a href="./register.html">Tạo tài khoản mới</a>
        </div>

        <div>
            Không nhớ mật khẩu?
            <a href="#">Quên mật khẩu</a>
        </div>

        <div>
            Đối tác của chúng tôi?
             <a href="#">Đăng nhập đối tác</a>
        </div>
    </div>
</body>

</html>
