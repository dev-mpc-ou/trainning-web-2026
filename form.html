<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form action="#" enctype="multipart/form-data" method="post">

        <div>
            <label for="name">Name:</label>
            <input type="text" name="name" id="name" placeholder="Nhập tên của bạn" required value="An Phan"
                maxlength="20" minlength="5">
        </div>
        <div>
            <label for="password">Password:</label>
            <input type="password" name="password" id="password" placeholder="Nhập mật khẩu" required value="123456"
                maxlength="20" minlength="5">
        </div>
        <div>
            <label for="date">Date:</label>
            <input type="date" name="date" id="date" required value="2024-06-01">
        </div>
        <div>
            <label for="datetime">Datetime:</label>
            <input type="datetime-local" name="datetime" id="datetime" required value="2024-06-01T12:00">
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" placeholder="Nhập email" required value="anphan@example.com"
                maxlength="50" minlength="5">
        </div>
        <div>
            <label for="file">File:</label>
            <input type="file" name="file" id="file" required accept=".jpg, .jpeg, .png, .pdf" multiple>
        </div>
        <div>
            <input type="hidden" name="hidden" id="hidden">
        </div>

        <div>
            <label for="month">Month:</label>
            <input type="month" name="month" id="month" required value="2024-06">
        </div>
        <div>
            <label for="number">Number:</label>
            <input type="number" name="number" id="number" required value="10" min="1" max="100" step="0.1">
        </div>
        <div>
            <label for="color">Color:</label>
            <input type="color" name="color" id="color" required value="#ff0000">
        </div>
        <div>
            <label for="search">Search:</label>
            <input type="search" name="search" id="search" placeholder="Tìm kiếm..." required value="Tìm kiếm"
                maxlength="50" minlength="5">
        </div>
        <div>
            <label for="tel">Telephone:</label>
            <input type="tel" name="tel" id="tel" placeholder="Nhập số điện thoại" required value="0123456789"
                maxlength="15" minlength="10">
        </div>
        <div>
            <label for="time">Time:</label>
            <input type="time" name="time" id="time" required value="12:00">
        </div>
        <div>
            <label for="url">URL:</label>
            <input type="url" name="url" id="url" placeholder="Nhập URL" required value="https://example.com"
                maxlength="100" minlength="5">
        </div>
        <div>
            <label for="week">Week:</label>
            <input type="week" name="week" id="week" required value="2024-W22">
        </div>
        <div>
            <input type="checkbox" name="a" id="checkbox1" value="1" checked>
            <label for="checkbox1">1</label>
            <input type="checkbox" name="a" id="checkbox2" value="2">
            <label for="checkbox2">2</label>
            <input type="checkbox" name="a" id="checkbox3" value="3">
            <label for="checkbox3">3</label>
            <input type="checkbox" name="a" id="checkbox4" value="4">
            <label for="checkbox4">4</label>
            <input type="checkbox" name="a" id="checkbox5" value="5">
            <label for="checkbox5">5</label>
        </div>

        <div>
            <label>Choose an option:</label>
            <input type="radio" name="a" id="radio1" value="1">
            <label for="radio1">1</label>
            <input type="radio" name="a" id="radio2" value="2" checked>
            <label for="radio2">2</label>
            <input type="radio" name="a" id="radio3" value="3">
            <label for="radio3">3</label>
            <input type="radio" name="a" id="radio4" value="4">
            <label for="radio4">4</label>
            <input type="radio" name="a" id="radio5" value="5">
            <label for="radio5">5</label>
        </div>

        <div>
            <label for="textarea">Textarea:</label>
            <textarea name="textarea" id="textarea" placeholder="Nhập nội dung..." required minlength="0"
                maxlength="1000" cols="100" rows="5"></textarea>
        </div>
        <div>
            <label for="range">Range:</label>
            <input type="range" name="range" id="range" required value="50" min="0" max="100" step="0.1">
        </div>
        <div>
            <label for="select">Select:</label>
            <select name="select" id="select" required>
                <option value="">Chọn một tùy chọn</option>
                <option value="1">Âm nhạc</option>
                <option value="2">Phim Ảnh</option>
                <option value="3">Tùy chọn 3</option>
            </select>

            
        </div>
        <input type="reset" value="Đặt lại">



        <button type="submit">Tạo mới</button>
        <div>
            <input type="image" alt="" src="./assets/img_submit.gif">
        </div>
    </form>

    <!-- ?name=An+Phan&password=123456&date=2024-06-01&datetime=2024-06-01T12%3A00 -->
    <hr>
    <!-- Tạo form tìm kiếm có lọc -->
    <form action="" method="get">
        <input type="search" name="search" id="search" placeholder="Tìm kiếm..." required value="Tìm kiếm"
            maxlength="50" minlength="5">
        <select name="category" id="category">
            <option value="">Tất cả</option>
            <option value="1">Thể thao</option>
            <option value="2">Âm nhạc</option>
            <option value="3">Phim ảnh</option>
        </select>
        <button type="submit">Tìm kiếm</button>
    </form>
</body>


</html>
