<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trang Đăng Nhập</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div>
      <form
        class="login"
        action="https://basic-web-training.vercel.app/api/practice/submit/login"
        method="post"
      >
        <h1 class="title">Đăng Nhập</h1>
        <p>
          Vui lòng nhập thông tin tài khoản của bạn để đăng nhập vào hệ thống.
        </p>
        <div>
          <label class="label" for="email">Email</label>
          <input
            class="input"
            type="email"
            id="email"
            name="email"
            required
            placeholder="vidu@email.com"
          />
        </div>

        <div>
          <label class="label" for="password">Mật khẩu</label>
          <input
            class="input"
            type="password"
            id="password"
            name="password"
            required
            minlength="6"
          />
        </div>

        <div>
          <input
            class="input"
            type="checkbox"
            id="remember"
            name="remember"
            value="1"
            checked
          />
          <label class="label" for="remember">Ghi nhớ đăng nhập</label>
        </div>

        <input class="input" type="hidden" name="formType" value="login" />

        <button type="submit">Đăng Nhập</button>
        <div>
          <p><a href="#">*Quên mật khẩu?*</a></p>
          <p>
            <a href="./register_1.html">*Chưa có tài khoản? Đăng ký ngay*</a>
          </p>
        </div>
      </form>
    </div>
  </body>
</html>
