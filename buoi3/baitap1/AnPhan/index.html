<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang đăng nhập</title>
    <style>
        form input {
            border: 1px solid blue;
            padding: 8px;
            font-size: 16px;
        
        }
         form label{
            margin: 10px;
            font-weight: bold;
        }

        header {
            text-align: center;
            color: red;
            font-style: italic;
            font-size: large;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            line-height: 1.6; 
            background-color:rgb(33, 37, 41)
            
        }

        form {
            display:inline-block;
            border: 1px dashed #ffffff;
            border-radius: 10%;
            border-bottom-width: 4px;
            text-align: left;
            width: 300px;
            color: #ffffff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        } 

        button{
            display: block;
            margin: 15px auto 0;
            padding: 8px 16px;
            align-items: center;
        }
    </style>

</head>

<body>
    
    <img src=https://www.bing.com/th/id/OIP.pm9TJKZnqVDJ6ly1iXObcgHaFH?w=193&h=135&c=8&rs=1&qlt=90&o=6&dpr=1.3&pid=3.1&rm=2"
        alt="">

    <style> </style>
    <form action="https://basic-web-training.vercel.app/api/practice/submit/logine" enctype="multipart/form-data"
        method="post">
        <div>
            <header>Trang đăng nhập</header>
        </div>
        <div>
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" placeholder="Nhập email" required value="abc@123" maxlength="50"
                minlength="5">
        </div>
        <div><label for="password">Password:</label>
            <input type="password" name="password" id="password" placeholder="Nhập password" required value="123456
        " maxlength="50" minlength="5">
        </div><button class="Đăng nhập">Đăng nhập</button>
        <div><input type="checkbox" name="remember" value="1">Lưu mật khẩu</div>
        <div>Chưa có tài khoản? <a href="#">Đăng ký ngay</a></div>
        <div>Không nhớ mật khẩu? <a href="#">Đặt lại mật khẩu</a></div>
        <div><input type="hidden" name="formType" value="login"></div>
        
    </form>

</body>

</html>
