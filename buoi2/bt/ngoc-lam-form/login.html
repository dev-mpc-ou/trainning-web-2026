<!doctype html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ThaiHungInfoTech</title>
</head>

<body>
    <div style="text-align: center">
        <img src="https://images-ext-1.discordapp.net/external/gEWSrCIBq4DiYoiOprzib5UWSXzXEUJOQyFj4we0QN8/%3Furl%3D%252Fimages%252Flogo.png%26w%3D32%26q%3D75/https/www.mpclub.dev/_next/image?format=webp&width=40&height=40"
            alt="Minh họa" />
    </div>
    <h1 style="text-align: center">Quản lý hóa đơn</h1>
    <div style="text-align: center">
        <h2>Đăng nhập</h2>
    </div>
    <form action="#" method="get">
        <div style="text-align: center">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="name@company.com" required />
        </div>
        <div style="text-align: center">
            <label for="password">Mật khẩu</label>
            <input type="password" id="password" placeholder="............" required />
        </div>
        <div style="text-align: center">
            <label>
                Ghi nhớ đăng nhập
                <input type="checkbox" checked />
            </label>
            <label>
                Test Mode
                <input type="checkbox" />
            </label>
        </div>
        <div style="text-align: center">
            <button type="submit">Đăng nhập</button>
        </div>
    </form>

    <div style="text-align: center">
        <p>Chưa có tài khoản? <a href="https://app.thaihunginfotech.com/register">Đăng ký ngay</a></p>
        <p>Không nhớ mật khẩu? <a href="https://app.thaihunginfotech.com/forgot-password">Đặt lại mật khẩu</a></p>
        <p>Bạn là khách hàng của doanh nghiệp? <a href="https://app.thaihunginfotech.com/partner/login">Đăng nhập đối
                tác</a></p>
    </div>
    </div>
</body>

</html>
