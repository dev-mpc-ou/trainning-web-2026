<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Quản lý Hóa đơn</title>
</head>

<body>

    <h1>Quản lý Hóa đơn</h1>

    <form class="login" action="#" method="get">
        <h2>Đăng nhập</h2>
        <div class="o-1">
            <label>Email</label>
            <input type="email" placeholder="name@company.com">
        </div>
        <div class="o-2">
            <label>Mật khẩu</label>
            <input type="password" placeholder="..........">
        </div>
        <label class="o-3">
            <input type="checkbox"> Ghi nhớ đăng nhập
        </label>
        <label class="o-4">
            <input type="checkbox"> Test Mode
        </label>
        <div class="o-5">
            <button class="Đăng nhập" type="submit">Đăng nhập</button>
        </div>
        <div>
            <div>Chưa có tài khoản? <a href="#">Đăng ký ngay</a></div>
            <div>Không nhớ mật khẩu? <a href="#">Đặt lại mật khẩu</a></div>
            <div>Bạn là khách hàng của doanh nghiệp? <a href="#">Đăng nhập đối tác</a></div>
        </div>
    </form>
</body>

</html>
