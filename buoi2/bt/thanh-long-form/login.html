<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            background: #1c2227;
        }

        .login-container {
            width: 320px;
            padding: 24px;
            border-radius: 12px;
            background: #14161a;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.1);
        }

        .login-container h1 {
            margin: 0 0 20px;
            font-size: 24px;
            text-align: center;
            color: #ffffff;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #ffffff;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #fdfeff;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #1e88e5;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
        }

        .login-button:hover {
            background: #3e94f7;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <img src="https://www.mpclub.dev/_next/image?url=%2Fimages%2Flogo.png&w=32&q=75" alt="Login Icon"
            style="display: block; margin: 0 auto 20px; width: 80px; height: 80px;" />
        <h1>Đăng nhập</h1>
        <form method="get" action="https://www.mpclub.dev/">
            <div class="form-group">
                <label for="username">Email</label>
                <input type="email" id="username" name="username" placeholder="Nhập email của bạn" required>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu của bạn" required>
            </div>
            <button type="submit" class="login-button">Đăng nhập</button>
            <p style="text-align: center; font-size: 14px; color: #ffffff;">Chưa có tài khoản? <a href="#"
                    style="color: #3e94f7;">Đăng ký ngay</a></p>
        </form>
    </div>
</body>

</html>
